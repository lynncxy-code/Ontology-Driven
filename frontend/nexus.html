<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OntoTwin Nexus 2.3 | 本体同步枢纽</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />

    <style>
        :root {
            /* Light Theme variables - Typeless style */
            --sidebar-bg: #ffffff;
            --sidebar-border: #eaeaea;
            --sidebar-hover: #f5f5f5;
            --sidebar-active: #f0f0f0;
            --sidebar-text: #666666;
            --sidebar-text-strong: #111111;
            --sidebar-title: #999999;
            --collapse-icon: #cccccc;
            
            /* Main Content Area */
            --main-bg: #fafafa;
            --topbar-bg: #ffffff;
            --topbar-border: #eaeaea;
            
            --font-ui: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            --sidebar-width: 240px;
            --sidebar-width-collapsed: 68px;
            --topbar-height: 56px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: var(--font-ui);
            background: var(--main-bg);
            color: var(--sidebar-text-strong);
            height: 100vh;
            overflow: hidden;
            display: flex;
            -webkit-font-smoothing: antialiased;
        }

        svg {
            display: block;
            flex-shrink: 0;
        }

        /* ── Sidebar ───────────────────────────────────── */
        .sidebar {
            width: var(--sidebar-width);
            background: var(--sidebar-bg);
            display: flex;
            flex-direction: column;
            border-right: 1px solid var(--sidebar-border);
            z-index: 100;
            transition: width 0.3s cubic-bezier(0.2, 0, 0, 1);
            position: relative;
        }

        .sidebar.collapsed {
            width: var(--sidebar-width-collapsed);
        }

        .sidebar-header {
            height: var(--topbar-height);
            display: flex;
            align-items: center;
            padding: 0 20px;
            font-size: 14px;
            font-weight: 600;
            color: var(--sidebar-text-strong);
            letter-spacing: -0.01em;
            gap: 10px;
            border-bottom: 1px solid transparent;
        }
        
        .logo-box {
            width: 24px;
            height: 24px;
            background: #111111;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: 600;
            color: white;
            flex-shrink: 0;
            margin-left: 2px;
        }

        .sidebar.collapsed .sidebar-header .logo-text {
            display: none;
        }

        .sidebar.collapsed .sidebar-header {
            padding: 0;
            justify-content: center;
        }

        .sidebar-menu {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            padding: 20px 12px;
        }

        .sidebar-menu::-webkit-scrollbar { width: 0px; }

        .menu-group {
            margin-bottom: 24px;
        }

        .sidebar.collapsed .menu-group {
            margin-bottom: 16px;
        }

        .menu-title-wrapper {
            display: flex;
            align-items: center;
            padding: 0 8px;
            margin-bottom: 6px;
            height: 24px;
        }

        .menu-title {
            font-size: 11px;
            font-weight: 500;
            color: var(--sidebar-title);
            display: flex;
            align-items: center;
            white-space: nowrap;
            opacity: 1;
            transition: opacity 0.2s;
        }

        .sidebar.collapsed .menu-title {
            opacity: 0;
            width: 0;
            overflow: hidden;
        }

        .sidebar.collapsed .menu-title-wrapper {
            border-top: 1px solid var(--sidebar-border);
            height: 12px;
            margin: 8px 8px 0;
        }

        .sidebar.collapsed .menu-group:first-child .menu-title-wrapper {
            border-top: none;
            height: 0;
            margin-top: 0;
        }

        .menu-item {
            display: flex;
            align-items: center;
            height: 36px;
            padding: 0 10px;
            color: var(--sidebar-text);
            font-size: 13px;
            font-weight: 500;
            text-decoration: none;
            border-radius: 6px;
            transition: background 0.15s, color 0.15s;
            cursor: pointer;
            margin-bottom: 2px;
            white-space: nowrap;
        }

        .menu-item:hover {
            background: var(--sidebar-hover);
            color: var(--sidebar-text-strong);
        }

        .menu-item.active {
            background: var(--sidebar-active);
            color: var(--sidebar-text-strong);
            font-weight: 600;
        }

        .menu-icon {
            color: inherit;
            margin-right: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 16px; 
            flex-shrink: 0;
            opacity: 0.8;
        }

        .menu-item:hover .menu-icon, .menu-item.active .menu-icon {
            opacity: 1;
        }

        .sidebar.collapsed .menu-icon {
            margin-right: 0;
        }

        .sidebar.collapsed .menu-item {
            justify-content: center;
            padding: 0;
        }

        .sidebar.collapsed .menu-text {
            display: none;
        }

        /* ── Collapse Toggle ───────────────────────────── */
        .collapse-footer {
            padding: 12px;
            border-top: 1px solid var(--sidebar-border);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .collapse-btn {
            width: calc(100% - 10px);
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-size: 13px;
            color: var(--sidebar-text);
            cursor: pointer;
            border-radius: 6px;
            border: none;
            background: transparent;
            transition: all 0.2s;
        }

        .collapse-btn:hover {
            background: var(--sidebar-hover);
            color: var(--sidebar-text-strong);
        }

        .sidebar.collapsed .collapse-btn {
            width: 36px;
        }

        .sidebar.collapsed .collapse-text {
            display: none;
        }
        
        .sidebar.collapsed .collapse-icon-svg {
            transform: scaleX(-1);
        }

        .sidebar-menu-wrapper {
            display: flex;
            flex-direction: column;
            height: calc(100vh - var(--topbar-height));
        }

        /* ── Main Content Area ─────────────────────────── */
        .main-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--main-bg);
            min-width: 0; /* Important for flex/iframe */
        }

        .topbar {
            height: var(--topbar-height);
            background: var(--topbar-bg);
            border-bottom: 1px solid var(--topbar-border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            z-index: 10;
        }

        .breadcrumb {
            font-size: 13px;
            color: #999999;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .breadcrumb .current {
            color: var(--sidebar-text-strong);
            font-weight: 500;
        }

        .topbar-actions {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .user-profile {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: #f0f0f0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 500;
            color: #333333;
            font-size: 11px;
            cursor: pointer;
            border: 1px solid rgba(0,0,0,0.05);
        }
        
        .user-profile:hover {
            background: #e0e0e0;
        }

        .content-frame {
            flex: 1;
            width: 100%;
            height: calc(100vh - var(--topbar-height));
            border: none;
            background: var(--main-bg);
            display: block;
        }
    </style>
</head>

<body>
    <!-- 左侧导航 -->
    <nav class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="logo-box">N</div>
            <div class="logo-text">OntoTwin Nexus</div>
        </div>
        
        <div class="sidebar-menu-wrapper">
            <div class="sidebar-menu">
                
                <!-- 大组 1：数据定义 -->
                <div class="menu-group">
                    <div class="menu-title-wrapper"><div class="menu-title">数据定义</div></div>
                    <a class="menu-item" onclick="navigate('语义图谱总览', '/ontology_graph?nexus=true', this)" title="语义图谱总览">
                        <span class="menu-icon"><svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"></circle><circle cx="6" cy="12" r="3"></circle><circle cx="18" cy="19" r="3"></circle><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"></line><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"></line></svg></span>
                        <span class="menu-text">语义图谱总览</span>
                    </a>
                </div>

                <!-- 大组 2：模型工坊 -->
                <div class="menu-group">
                    <div class="menu-title-wrapper"><div class="menu-title">模型工坊</div></div>
                    <a class="menu-item" onclick="navigate('CAD 一键成模', '/cad_generator?nexus=true', this)" title="CAD 一键成模">
                        <span class="menu-icon"><svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"></rect><path d="M8 16L16 8"></path><path d="M10 8h6v6"></path><path d="M7 12h2"></path><path d="M12 17v-2"></path></svg></span>
                        <span class="menu-text">CAD 一键成模</span>
                    </a>
                </div>

                <!-- 大组 3：接口治理 -->
                <div class="menu-group">
                    <div class="menu-title-wrapper"><div class="menu-title">接口治理</div></div>
                    <a class="menu-item active" id="default-menu" onclick="navigate('本体配置中心', '/ontology?nexus=true', this)" title="本体配置中心">
                        <span class="menu-icon"><svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><line x1="12" y1="2" x2="12" y2="4"/><line x1="12" y1="20" x2="12" y2="22"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="2" y1="12" x2="4" y2="12"/><line x1="20" y1="12" x2="22" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg></span>
                        <span class="menu-text">本体配置中心</span>
                    </a>
                </div>

                <!-- 大组 4：运行守护 -->
                <div class="menu-group">
                    <div class="menu-title-wrapper"><div class="menu-title">运行守护</div></div>
                    <a class="menu-item" onclick="navigate('实例运维与监控', '/instance?nexus=true', this)" title="实例运维与监控">
                        <span class="menu-icon"><svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect><line x1="8" y1="21" x2="16" y2="21"></line><line x1="12" y1="17" x2="12" y2="21"></line></svg></span>
                        <span class="menu-text">实例运维与监控</span>
                    </a>
                    <a class="menu-item" onclick="navigate('实时数据监控台', '/floor_pulse?nexus=true', this)" title="实时数据监控台 · 中转站数据透视">
                        <span class="menu-icon"><svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline></svg></span>
                        <span class="menu-text">实时数据监控台</span>
                    </a>
                </div>

            </div>

            <div class="collapse-footer">
                <button class="collapse-btn" onclick="toggleSidebar()" title="展开/收起导航">
                    <span class="menu-icon">
                        <svg class="collapse-icon-svg" viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="9" y1="3" x2="9" y2="21"></line></svg>
                    </span>
                    <span class="collapse-text">收起侧栏</span>
                </button>
            </div>
        </div>
    </nav>

    <!-- 右侧容器 -->
    <main class="main-wrapper">
        <div class="topbar">
            <div class="breadcrumb" id="breadcrumb">
                OntoTwin Nexus 2.3 <span style="font-size:11px; opacity:0.4; margin:0 6px;">/</span> <span class="current" id="current-page-title">本体配置中心</span>
            </div>
            <div class="topbar-actions">
                <div class="user-profile">AD</div>
            </div>
        </div>
        
        <!-- Iframe 嵌套现有页面 -->
        <iframe id="main-frame" class="content-frame" src="/ontology?nexus=true" sandbox="allow-scripts allow-same-origin allow-forms"></iframe>
    </main>

    <script>
        function navigate(title, url, element) {
            if (url.startsWith('http') || !element) return;
            document.getElementById('main-frame').src = url;
            document.getElementById('current-page-title').textContent = title;
            document.querySelectorAll('.menu-item').forEach(el => el.classList.remove('active'));
            element.classList.add('active');
        }

        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            sidebar.classList.toggle('collapsed');
        }
    </script>
</body>

</html>
